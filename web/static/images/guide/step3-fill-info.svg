<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="600" height="36" fill="#16213e" rx="8"/>
  <rect x="0" y="28" width="600" height="8" fill="#16213e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="300" y="22" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">open.douyin.com - 创建应用</text>

  <!-- Form -->
  <text x="180" y="70" fill="#ccd6f6" font-size="18" font-weight="bold" font-family="sans-serif">创建网站应用</text>

  <!-- App type -->
  <text x="180" y="105" fill="#8892b0" font-size="13" font-family="sans-serif">应用类型</text>
  <rect x="180" y="112" width="120" height="36" rx="6" fill="#0f3460" stroke="#FE2C55" stroke-width="2"/>
  <text x="240" y="136" text-anchor="middle" fill="#FE2C55" font-size="13" font-family="sans-serif">网站应用</text>
  <rect x="310" y="112" width="120" height="36" rx="6" fill="#0f3460" stroke="#1a1a2e" stroke-width="1"/>
  <text x="370" y="136" text-anchor="middle" fill="#8892b0" font-size="13" font-family="sans-serif">移动应用</text>

  <!-- App name -->
  <text x="180" y="175" fill="#8892b0" font-size="13" font-family="sans-serif">应用名称 <tspan fill="#FE2C55">*</tspan></text>
  <rect x="180" y="182" width="380" height="36" rx="6" fill="#0f3460" stroke="#1a1a2e" stroke-width="1"/>
  <text x="195" y="206" fill="#ccd6f6" font-size="13" font-family="sans-serif">视频自动发布助手</text>

  <!-- App description -->
  <text x="180" y="240" fill="#8892b0" font-size="13" font-family="sans-serif">应用描述 <tspan fill="#FE2C55">*</tspan></text>
  <rect x="180" y="247" width="380" height="60" rx="6" fill="#0f3460" stroke="#1a1a2e" stroke-width="1"/>
  <text x="195" y="270" fill="#ccd6f6" font-size="13" font-family="sans-serif">用于定时自动发布视频到抖音平台</text>

  <!-- Callback URL -->
  <text x="180" y="330" fill="#8892b0" font-size="13" font-family="sans-serif">回调地址 <tspan fill="#FE2C55">*</tspan></text>
  <rect x="180" y="337" width="380" height="36" rx="6" fill="#0f3460" stroke="#25F4EE" stroke-width="1"/>
  <text x="195" y="361" fill="#25F4EE" font-size="13" font-family="monospace">http://localhost:8080/callback</text>

  <!-- Arrow highlighting callback field -->
  <text x="565" y="360" fill="#25F4EE" font-size="20">←</text>

  <text x="300" y="355" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">第三步：填写应用信息，回调地址填写 http://localhost:8080/callback</text>
</svg>
