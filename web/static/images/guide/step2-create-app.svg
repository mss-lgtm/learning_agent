<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="600" height="36" fill="#16213e" rx="8"/>
  <rect x="0" y="28" width="600" height="8" fill="#16213e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="300" y="22" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">open.douyin.com - 开发者中心</text>

  <!-- Sidebar -->
  <rect x="0" y="36" width="150" height="324" fill="#16213e"/>
  <rect x="10" y="50" width="130" height="36" rx="6" fill="#0f3460"/>
  <text x="75" y="74" text-anchor="middle" fill="#ccd6f6" font-size="13" font-family="sans-serif">管理中心</text>
  <text x="75" y="110" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">我的应用</text>
  <text x="75" y="140" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">权限管理</text>
  <text x="75" y="170" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">开发文档</text>

  <!-- Main content -->
  <text x="180" y="70" fill="#ccd6f6" font-size="18" font-weight="bold" font-family="sans-serif">我的应用</text>

  <!-- Create button highlighted -->
  <rect x="430" y="50" width="140" height="40" rx="8" fill="#FE2C55"/>
  <text x="500" y="76" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">+ 创建应用</text>

  <!-- Arrow pointing to button -->
  <path d="M420 70 L430 70" stroke="#25F4EE" stroke-width="2" fill="none"/>
  <polygon points="428,65 438,70 428,75" fill="#25F4EE"/>

  <!-- Empty state -->
  <rect x="180" y="110" width="400" height="180" rx="8" fill="#0f3460" stroke="#1a1a2e" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="380" y="190" text-anchor="middle" fill="#8892b0" font-size="14" font-family="sans-serif">暂无应用</text>
  <text x="380" y="215" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">点击右上角「创建应用」开始</text>

  <!-- Important note -->
  <rect x="180" y="300" width="400" height="40" rx="6" fill="rgba(254,44,85,0.15)" stroke="#FE2C55" stroke-width="1"/>
  <text x="380" y="325" text-anchor="middle" fill="#FE2C55" font-size="12" font-family="sans-serif">⚠ 需要完成企业开发者认证后才能创建应用</text>

  <text x="300" y="355" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">第二步：进入管理中心，点击「创建应用」</text>
</svg>
