<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="600" height="36" fill="#16213e" rx="8"/>
  <rect x="0" y="28" width="600" height="8" fill="#16213e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="300" y="22" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">TikTok Publisher - 系统设置</text>

  <!-- Title -->
  <text x="180" y="70" fill="#ccd6f6" font-size="18" font-weight="bold" font-family="sans-serif">抖音账号配置</text>

  <!-- Client Key input -->
  <text x="180" y="110" fill="#8892b0" font-size="13" font-family="sans-serif">Client Key <tspan fill="#FE2C55">*</tspan></text>
  <rect x="180" y="118" width="380" height="36" rx="6" fill="#0f3460" stroke="#25F4EE" stroke-width="2"/>
  <text x="195" y="142" fill="#25F4EE" font-size="13" font-family="monospace">awxxxxxxxxxxxxxxxx</text>

  <!-- Arrow from credential page -->
  <text x="565" y="142" fill="#25F4EE" font-size="16">← 粘贴</text>

  <!-- Client Secret input -->
  <text x="180" y="180" fill="#8892b0" font-size="13" font-family="sans-serif">Client Secret <tspan fill="#FE2C55">*</tspan></text>
  <rect x="180" y="188" width="380" height="36" rx="6" fill="#0f3460" stroke="#FE2C55" stroke-width="2"/>
  <text x="195" y="212" fill="#FE2C55" font-size="13" font-family="monospace">••••••••••••••••••••</text>

  <!-- Security badge -->
  <rect x="180" y="230" width="380" height="28" rx="6" fill="rgba(37,244,238,0.08)" stroke="rgba(37,244,238,0.2)" stroke-width="1"/>
  <text x="370" y="250" text-anchor="middle" fill="#25F4EE" font-size="11" font-family="sans-serif">🔒 密文存储：Client Secret 将使用 AES-256 加密保存到本地</text>

  <!-- Buttons -->
  <rect x="180" y="270" width="180" height="40" rx="8" fill="#0f3460" stroke="#8892b0" stroke-width="1"/>
  <text x="270" y="296" text-anchor="middle" fill="#ccd6f6" font-size="13" font-family="sans-serif">💾 保存凭证</text>

  <rect x="380" y="270" width="180" height="40" rx="8" fill="#FE2C55"/>
  <text x="470" y="296" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">🔓 授权登录</text>

  <!-- Arrow pointing to authorize button -->
  <text x="565" y="296" fill="#FE2C55" font-size="16">← 点击</text>

  <!-- Note -->
  <rect x="180" y="320" width="380" height="25" rx="6" fill="rgba(0,230,118,0.1)" stroke="#00E676" stroke-width="1"/>
  <text x="370" y="338" text-anchor="middle" fill="#00E676" font-size="11" font-family="sans-serif">✓ 填入凭证后点击「授权登录」完成抖音账号绑定</text>

  <text x="300" y="355" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">第六步：将凭证粘贴到本工具，点击「授权登录」完成配置</text>
</svg>
