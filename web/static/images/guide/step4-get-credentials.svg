<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="0" width="600" height="36" fill="#16213e" rx="8"/>
  <rect x="0" y="28" width="600" height="8" fill="#16213e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="300" y="22" text-anchor="middle" fill="#8892b0" font-size="12" font-family="sans-serif">open.douyin.com - 应用详情</text>

  <!-- App header -->
  <rect x="180" y="50" width="400" height="50" rx="8" fill="#0f3460"/>
  <text x="200" y="80" fill="#ccd6f6" font-size="16" font-weight="bold" font-family="sans-serif">视频自动发布助手</text>
  <rect x="440" y="60" width="80" height="28" rx="14" fill="rgba(0,230,118,0.2)"/>
  <text x="480" y="80" text-anchor="middle" fill="#00E676" font-size="12" font-family="sans-serif">已上线</text>

  <!-- Tabs -->
  <text x="180" y="130" fill="#8892b0" font-size="13" font-family="sans-serif">应用信息</text>
  <rect x="280" y="115" width="120" height="30" rx="4" fill="rgba(254,44,85,0.15)"/>
  <text x="340" y="136" text-anchor="middle" fill="#FE2C55" font-size="13" font-weight="bold" font-family="sans-serif">凭证信息</text>
  <text x="430" y="130" fill="#8892b0" font-size="13" font-family="sans-serif">权限管理</text>

  <!-- Credentials section -->
  <rect x="180" y="155" width="400" height="150" rx="8" fill="#0f3460" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Client Key -->
  <text x="200" y="185" fill="#8892b0" font-size="13" font-family="sans-serif">Client Key</text>
  <rect x="200" y="192" width="300" height="32" rx="4" fill="#1a1a2e" stroke="#16213e" stroke-width="1"/>
  <text x="215" y="214" fill="#25F4EE" font-size="13" font-family="monospace">awxxxxxxxxxxxxxxxx</text>
  <rect x="510" y="195" width="50" height="26" rx="4" fill="#0f3460" stroke="#8892b0" stroke-width="1"/>
  <text x="535" y="214" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">复制</text>

  <!-- Client Secret -->
  <text x="200" y="250" fill="#8892b0" font-size="13" font-family="sans-serif">Client Secret</text>
  <rect x="200" y="257" width="300" height="32" rx="4" fill="#1a1a2e" stroke="#16213e" stroke-width="1"/>
  <text x="215" y="279" fill="#FE2C55" font-size="13" font-family="monospace">••••••••••••••••••••</text>
  <rect x="510" y="260" width="50" height="26" rx="4" fill="#0f3460" stroke="#8892b0" stroke-width="1"/>
  <text x="535" y="279" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">复制</text>

  <!-- Arrow highlighting credentials -->
  <text x="565" y="210" fill="#25F4EE" font-size="20">←</text>
  <text x="565" y="275" fill="#FE2C55" font-size="20">←</text>

  <!-- Security note -->
  <rect x="180" y="315" width="400" height="30" rx="6" fill="rgba(254,44,85,0.1)" stroke="#FE2C55" stroke-width="1"/>
  <text x="380" y="336" text-anchor="middle" fill="#FE2C55" font-size="11" font-family="sans-serif">⚠ Client Secret 是敏感信息，请妥善保管，不要泄露</text>

  <text x="300" y="355" text-anchor="middle" fill="#8892b0" font-size="11" font-family="sans-serif">第四步：在「凭证信息」页面复制 Client Key 和 Client Secret</text>
</svg>
